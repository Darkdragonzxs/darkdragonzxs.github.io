<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@.dzxs</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.15);
      --card-bg: rgba(0,0,0,0.6);
      --accent: #8b5cf6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1) brightness(0.45);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(139,92,246,0.3), transparent 55%),
                  rgba(0,0,0,0.75);
      z-index: -1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s ease;
      z-index: 10;
    }

    #text {
      font-size: 38px;
      font-weight: 300;
      letter-spacing: 1px;
      opacity: 1;
      text-align: center;
      padding: 0 1.5rem;
      transition: opacity 0.4s ease;
    }

    .click-text {
      margin-top: 24px;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.6;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
      user-select: none;
    }

    .click-text:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    #main-content {
      display: none;
      z-index: 1;
      padding: 16px;
      width: 100%;
      max-width: 420px;
    }

    .card {
      width: 100%;
      padding: 32px 26px;
      border: 1px solid var(--border);
      border-radius: 20px;
      text-align: center;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
    }

    .card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      filter: grayscale(1);
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .card h1 {
      margin: 0;
      font-weight: 500;
      font-size: 1.6rem;
      letter-spacing: 0.04em;
    }

    .tagline {
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .links {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .links a {
      color: var(--fg);
      font-size: 22px;
      opacity: 0.7;
      transition: opacity 0.2s ease, transform 0.2s ease, color 0.2s ease;
    }

    .links a:hover {
      opacity: 1;
      transform: translateY(-2px);
      color: var(--accent);
    }

    .links a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    @media (max-width: 480px) {
      #text {
        font-size: 28px;
      }
      .card {
        padding: 26px 20px;
      }
      .card img {
        width: 96px;
        height: 96px;
      }
    }
  </style>
</head>
<body>
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="https://zxs.rest/bg.mp4" type="video/mp4">
  </video>

  <div class="overlay" id="overlay">
    <div id="text"></div>
    <div class="click-text" onclick="startSequence()">enter</div>
  </div>

  <div id="main-content">
    <div class="card">
      <img src="https://zxs.rest/gay.png" alt="Profile picture of zxs">
      <h1>zxs</h1>
      <p class="tagline">fullstack dev</p>
      <div class="links">
        <a href="https://luna.loan/" target="_blank" rel="noopener noreferrer" aria-label="Luna">
          <i class="ri-moon-line"></i>
        </a>
        <a href="https://github.com/darkdragonzxs" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <i class="ri-github-line"></i>
        </a>
        <a href="https://discord.gg/1un4" target="_blank" rel="noopener noreferrer" aria-label="Discord">
          <i class="ri-discord-line"></i>
        </a>
      </div>
    </div>
  </div>

  <audio id="bg-music" src="bg.mp3" preload="auto"></audio>

  <script>
    const phrases = [
      "...",
      "is this the real life?",
      "...",
      "is this just fantasy?",
      "...",
      "caught in a landslide",
      "no escape from reality"
    ];

    const delays = [1.8, 2.8, 0.6, 2.6, 0.6, 3.2, 2.4];

    function startSequence() {
      const overlay = document.getElementById("overlay");
      const text = document.getElementById("text");
      const clickText = document.querySelector(".click-text");
      const audio = document.getElementById("bg-music");

      clickText.style.display = "none";

      audio.volume = 0.55;
      audio.loop = true;
      audio.play().catch(() => {});

      let i = 0;
      const fadeDuration = 0.35;

      (function next() {
        if (i < phrases.length) {
          text.textContent = phrases[i];
          text.style.opacity = 0;

          requestAnimationFrame(() => {
            text.style.opacity = 1;
          });

          const totalTime = delays[i] * 1000;

          setTimeout(() => {
            text.style.opacity = 0;
          }, totalTime - fadeDuration * 1000);

          setTimeout(next, totalTime);
          i++;
        } else {
          overlay.style.opacity = "0";
          setTimeout(() => {
            overlay.remove();
            document.getElementById("main-content").style.display = "block";
          }, 800);
        }
      })();
    }

    const bgVideo = document.getElementById("bg-video");
    bgVideo.muted = true;
    bgVideo.volume = 0;
  </script>
</body>
</html>
