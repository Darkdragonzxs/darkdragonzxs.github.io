<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@.dzxs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

<style>
:root {
  --bg:#000;
  --fg:#fff;
  --muted:rgba(255,255,255,0.65);
  --border:rgba(255,255,255,0.15);
  --card-bg:rgba(0,0,0,0.6);
  --accent:#ffffff;
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--fg);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

#bg-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:grayscale(1) brightness(0.45);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,rgba(139,92,246,0.3),transparent 55%),rgba(0,0,0,0.75);
  z-index:-1;
}

.overlay{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  transition:opacity .8s;
}

.click-text{
  font-size:14px;
  letter-spacing:5px;
  opacity:.7;
  cursor:pointer;
}

#main-content{
  display:none;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.dashboard{
  display:flex;
  gap:24px;
  align-items:center;
}

.panel{
  width:260px;
  border:1px solid var(--border);
  border-radius:16px;
  background:var(--card-bg);
  backdrop-filter:blur(14px);
  padding:14px;
}

.panel-title{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  font-size:.9rem;
}

.panel-title i{color:var(--accent)}

.row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 4px;
  text-decoration:none;
  color:inherit;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.row:last-child{border:none}

.row:hover{
  background:rgba(255,255,255,0.05);
}

.row img{
  width:22px;
  height:22px;
  border-radius:5px;
}

.small{
  font-size:.75rem;
  color:var(--muted);
}

.card{
  width:280px;
  padding:26px;
  border:1px solid var(--border);
  border-radius:20px;
  background:var(--card-bg);
  backdrop-filter:blur(16px);
  text-align:center;
}

.card img{
  width:90px;
  height:90px;
  border-radius:50%;
}

.tagline{color:var(--muted)}
.bio{font-size:.85rem;color:var(--muted)}

.links{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-top:12px;
}

.links a{
  color:var(--fg);
  font-size:18px;
  opacity:.7;
}
.links a:hover{opacity:1;color:var(--accent)}

</style>
</head>

<body>

<video id="bg-video" autoplay muted loop>
<source src="/bg.mp4">
</video>

<div class="overlay" id="overlay">
  <div class="click-text" onclick="startSequence()">enter</div>
</div>

<div id="main-content">

<div class="dashboard">

<div class="panel">
<div class="panel-title"><i class="ri-plug-line"></i> webports</div>

<div class="row">
<img src="https://cdn2.steamgriddb.com/icon/98f0d5f93731b7f3186531c37cca0945/32/256x256.png">
<div>
<div>katawa shoujo</div>
<div class="small">ren'py</div>
</div>
</div>

<div class="row">
<img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2133930/header.jpg?t=1702670766">
<div>
<div>stillwater</div>
<div class="small">ren'py</div>
</div>
</div>

</div>

<div class="card">
<img src="/gay.png">
<h1>zxs</h1>
<p class="tagline">@.dzxs</p>

<p class="bio">
full stack dev, random internet tools and other stuff
</p>

<div class="links">
<a href="https://github.com/DarkDragonZXS" target="_blank"><i class="ri-github-line"></i></a>
<a href="https://discord.com/users/1079096114273320971" target="_blank"><i class="ri-discord-line"></i></a>
<a href="https://luna.loan" target="_blank"><i class="ri-moon-line"></i></a>
</div>
</div>

<div class="panel">
<div class="panel-title"><i class="ri-team-line"></i> Organizations</div>

<a class="row" href="https://wiltedservices.org" target="_blank">
<img src="https://wiltedservices.org/assets/WILTED%20SERVICES%20(1).png">
<div>
<div>wilted services</div>
<div class="small">modernizing unblocking</div>
</div>
</a>

<a class="row" href="https://wasm.rip" target="_blank">
<img src="https://avatars.githubusercontent.com/u/262451264?s=200&v=4">
<div>
<div>wasm.rip</div>
<div class="small">webporting organization</div>
</div>
</a>

</div>

</div>
</div>

<audio id="bg-music" src="/bg.mp3" preload="auto"></audio>

<script>
function startSequence(){
  const overlay = document.getElementById("overlay");
  const audio = document.getElementById("bg-music");

  audio.volume = 0.55;
  audio.loop = true;
  audio.play().catch(()=>{});

  overlay.style.opacity="0";

  setTimeout(()=>{
    overlay.remove();
    document.getElementById("main-content").style.display="flex";
  },800);
}
</script>

</body>
</html>
